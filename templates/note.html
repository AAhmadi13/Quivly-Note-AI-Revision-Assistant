<!DOCTYPE html>
<html>
<head>
    <title>{% if note %}{% set _t = (note.title or '')|trim %}{% if _t %}{{ _t }} | Quivly{% else %}Note | Quivly{% endif %}{% else %}New note | Quivly{% endif %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-scale.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/note.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ui-polish-overrides.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="note-container">
    <div id="note-page-privacy-root" class="note-page-privacy-root">
    <div class="note-header note-blur-zone">
        <div class="header-left">
            <button class="back-button" onclick="window.location.href='/dashboard';">←</button>
            <input type="text" id="title" placeholder="Note Title">
        </div>
        <div class="note-actions">
            <button type="button" class="note-lock-btn-page" id="note-lock-btn-page" title="Lock note" aria-label="Lock note" hidden disabled>
                <svg class="note-lock-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path class="note-lock-icon-open" d="M7 11V8a5 5 0 0 1 9.584-2M6 11h12a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    <path class="note-lock-icon-closed" d="M7 11V8a5 5 0 0 1 10 0v3M6 11h12a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="note-lock-label">Lock</span>
            </button>
            <button class="delete-button" onclick="deleteNote()" title="Delete note">
                <i data-lucide="trash-2"></i>
            </button>
        </div>
    </div>

    <div class="note-toolbar note-blur-zone">
        <button class="toolbar-btn">H1</button>
        <button class="toolbar-btn">H2</button>
        <button class="toolbar-btn active">Normal</button>
        <button class="toolbar-btn">B</button>
        <button class="toolbar-btn">I</button>
        <button class="toolbar-btn">≡</button>
        <button class="toolbar-btn">•</button>
        <button class="toolbar-btn">↶</button>
        <button class="toolbar-btn">↷</button>
    </div>

    <div class="note-content-wrapper">
        <div class="note-editor-section note-blur-zone">
            <textarea id="content" placeholder="Start typing..."></textarea>
        </div>
        <div class="chat-panel-section note-blur-zone">
            <iframe id="chat-iframe" src="/chat" frameborder="0" allow="microphone"></iframe>
        </div>
    </div>
    </div>
</div>

<script type="application/json" id="note-init-data">{% if note and content_hidden %}{"id": {{ note.id }}, "title": "", "content": "", "is_locked": true, "content_hidden": true}{% elif note %}{"id": {{ note.id }}, "title": {{ note.title|tojson }}, "content": {{ note.content|tojson }}, "is_locked": {{ note.is_locked|default(false)|tojson }}, "content_hidden": false}{% else %}{"id": null, "title": "", "content": "", "is_locked": false, "content_hidden": false}{% endif %}</script>

<script defer src="{{ url_for('static', filename='js/note-page.js') }}"></script>

</body>
</html>
